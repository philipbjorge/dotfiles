# Pinned tool versions managed by mise.
# Bump via https://mise-versions.jdx.dev/tools/<tool>

[tools]
node       = "25.9.0"
uv         = "0.11.7"
ripgrep    = "15.1.0"
jq         = "1.8.1"
fd         = "10.4.2"
tree-sitter = "0.26.8"
lazygit    = "0.61.1"
lazydocker = "0.25.2"
pi         = "0.68.1"
rtk        = "0.37.2"

# npm-backed CLIs (no sudo, no global npm needed)
"npm:@openai/codex"              = "0.122.0"
"npm:@anthropic-ai/claude-code"  = "2.1.114"
"npm:ctx7"                       = "0.3.13"  # Context7 library-docs CLI

# github: pulls prebuilt release binaries from GitHub (no compile, verifies SLSA)
"github:sudosubin/grep-app-cli"  = "0.1.0"   # grep.app code search
"github:hamsurang/deepwiki-cli"  = "0.2.0"   # DeepWiki repo Q&A

# aqua has a curated asset map for neovim (ubi can't match its release names)
"aqua:neovim/neovim" = "0.12.1"
